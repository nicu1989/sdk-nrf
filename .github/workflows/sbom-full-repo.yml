name: Full Repository SBOM

on:
  workflow_dispatch:
    inputs:
      shards:
        description: Number of scan shards to create.
        required: false
        default: 8
        type: number
      max_parallel:
        description: Maximum number of shard jobs to run at once.
        required: false
        default: 8
        type: number
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/sbom-full-repo.yml
      - scripts/west_commands/sbom/**
      - scripts/requirements-fixed.txt
      - scripts/requirements-west-ncs-sbom.txt

permissions:
  contents: read

concurrency:
  group: full-repo-sbom-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  REPO_PATH: nrf
  SBOM_HELPER: scripts/west_commands/sbom/helpers/ci_repo_sbom.py
  SBOM_SHARDS: ${{ github.event.inputs.shards || '8' }}

jobs:
  prepare:
    name: Prepare SBOM matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      shard_count: ${{ steps.matrix.outputs.shard_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: ${{ env.REPO_PATH }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build matrix
        id: matrix
        shell: bash
        working-directory: ${{ env.REPO_PATH }}
        run: |
          matrix_json="$(python "${SBOM_HELPER}" matrix --shards "${SBOM_SHARDS}")"
          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"
          echo "shard_count=${SBOM_SHARDS}" >> "${GITHUB_OUTPUT}"

  scan:
    name: Scan shard ${{ matrix.shard_index }}
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '8') }}
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout full west workspace
        uses: nrfconnect/action-checkout-west-update@main
        with:
          path: ${{ env.REPO_PATH }}
          git-fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            nrf/scripts/requirements-fixed.txt
            nrf/scripts/requirements-west-ncs-sbom.txt

      - name: Install dependencies
        run: |
          python -m pip install \
            -r nrf/scripts/requirements-fixed.txt \
            -r nrf/scripts/requirements-west-ncs-sbom.txt

      - name: Build shard input list
        shell: bash
        working-directory: ${{ env.REPO_PATH }}
        run: |
          python "${SBOM_HELPER}" list-files \
            --shards "${SBOM_SHARDS}" \
            --shard-index "${{ matrix.shard_index }}" \
            --output .sbom-shard-${{ matrix.shard_index }}.txt

      - name: Run SBOM for shard
        shell: bash
        working-directory: ${{ env.REPO_PATH }}
        run: |
          mkdir -p .sbom-output
          if [[ ! -s .sbom-shard-${{ matrix.shard_index }}.txt ]]; then
            printf '{"files":{}}\n' > .sbom-output/cache-${{ matrix.shard_index }}.json
            exit 0
          fi
          west ncs-sbom \
            --input-list-file .sbom-shard-${{ matrix.shard_index }}.txt \
            --license-detectors spdx-tag,full-text,external-file,scancode-toolkit \
            --output-cache-database .sbom-output/cache-${{ matrix.shard_index }}.json

      - name: Upload shard cache
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: sbom-cache-${{ matrix.shard_index }}
          path: nrf/.sbom-output/cache-${{ matrix.shard_index }}.json
          retention-days: 3
          include-hidden-files: true

  finalize:
    name: Finalize full repository SBOM
    needs:
      - prepare
      - scan
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout full west workspace
        uses: nrfconnect/action-checkout-west-update@main
        with:
          path: ${{ env.REPO_PATH }}
          git-fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            nrf/scripts/requirements-fixed.txt
            nrf/scripts/requirements-west-ncs-sbom.txt

      - name: Install dependencies
        run: |
          python -m pip install \
            -r nrf/scripts/requirements-fixed.txt \
            -r nrf/scripts/requirements-west-ncs-sbom.txt

      - name: Download shard caches
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: sbom-cache-*
          path: nrf/.sbom-cache-shards
          merge-multiple: true

      - name: Merge cache databases
        shell: bash
        working-directory: ${{ env.REPO_PATH }}
        run: |
          mkdir -p .sbom-output
          python "${SBOM_HELPER}" list-files \
            --output .sbom-all-files.txt
          python "${SBOM_HELPER}" merge-cache \
            --output .sbom-output/sbom-full-repo-cache.json \
            .sbom-cache-shards/*.json

      - name: Generate merged SBOM reports
        shell: bash
        working-directory: ${{ env.REPO_PATH }}
        run: |
          west ncs-sbom \
            --input-list-file .sbom-all-files.txt \
            --input-cache-database .sbom-output/sbom-full-repo-cache.json \
            --license-detectors cache-database,git-info \
            --optional-license-detectors "" \
            --output-html .sbom-output/sbom-full-repo.html \
            --output-spdx .sbom-output/sbom-full-repo.spdx

      - name: Upload final SBOM artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: sbom-full-repo
          path: nrf/.sbom-output
          retention-days: 7
          include-hidden-files: true
